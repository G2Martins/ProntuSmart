<div class="max-w-5xl mx-auto space-y-6">
  
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Nova Evolução Clínica</h2>
      <p class="text-blue-600 font-semibold mt-1">Área Específica: {{ areaProntuario }}</p>
    </div>
    <a routerLink="/pacientes" class="flex items-center text-gray-600 hover:text-blue-600 font-medium transition-colors group">
      <iconify-icon icon="ph:arrow-left-bold" class="mr-2 text-xl group-hover:-translate-x-1 transition-transform"></iconify-icon>
      Cancelar e Voltar
    </a>
  </div>

  <form [formGroup]="evolucaoForm" (ngSubmit)="onSubmit()" class="bg-white shadow rounded-lg border border-gray-100 overflow-hidden">
    
    <div class="p-8 border-b">
      <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-3">Relatório Descritivo (SOAP)</label>
      <textarea formControlName="texto_clinico" rows="6" class="w-full rounded-md border border-gray-300 p-4 focus:ring-2 focus:ring-blue-500 outline-none resize-y" placeholder="Descreva os dados Subjetivos, Objetivos, Avaliação e Plano..."></textarea>
    </div>

    <div class="p-8 bg-blue-50/30">
      <div class="flex items-center mb-6">
        <iconify-icon icon="ph:chart-line-up-bold" class="text-2xl text-blue-600 mr-2"></iconify-icon>
        <h4 class="text-lg font-bold text-gray-800">Indicadores Funcionais ({{ areaProntuario }})</h4>
      </div>

      <div formArrayName="medicoes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <div *ngFor="let medicaoCtrl of medicoesArray.controls; let i = index" [formGroupName]="i" class="bg-white p-4 rounded border shadow-sm border-l-4 border-l-blue-500">
          <label class="block text-sm font-semibold text-gray-700 mb-1">{{ medicaoCtrl.value.nome_indicador }}</label>
          <div class="flex items-center mt-2">
            <input type="text" formControlName="valor_registrado" class="w-24 rounded-l-md border border-gray-300 p-2 focus:ring-2 focus:ring-blue-500 outline-none text-center font-bold">
            <span class="bg-gray-100 border border-l-0 border-gray-300 rounded-r-md px-3 py-2 text-sm text-gray-600 flex-1">{{ medicaoCtrl.value.unidade }}</span>
          </div>
        </div>

      </div>
    </div>

    <div class="p-6 bg-gray-50 flex justify-end gap-4 border-t">
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg shadow font-bold flex items-center transition-colors">
        Salvar como Pendente de Revisão
      </button>
    </div>
  </form>
</div>
