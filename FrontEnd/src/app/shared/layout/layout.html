<div class="flex h-screen bg-gray-100 font-sans">

  <aside class="w-64 bg-blue-900 text-white flex flex-col shadow-lg">
    <div class="p-6 text-center text-2xl font-bold tracking-wider border-b border-blue-800">
      <iconify-icon icon="ph:heartbeat-bold" class="inline-block align-middle mr-2"></iconify-icon>
      ProntuSMART
    </div>

    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">

      <a routerLink="/dashboard"
         routerLinkActive="bg-blue-800"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer">
        <iconify-icon icon="ph:squares-four" class="text-xl mr-3"></iconify-icon> Dashboard
      </a>

      <a routerLink="/pacientes"
         routerLinkActive="bg-blue-800"
         class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer">
        <iconify-icon icon="ph:users-three-bold" class="text-xl mr-3"></iconify-icon> Pacientes e Prontuários
      </a>

      <a routerLink="/relatorios"
         routerLinkActive="bg-blue-800"
         class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer">
        <iconify-icon icon="ph:file-text-bold" class="text-xl mr-3"></iconify-icon> Relatórios
      </a>

      <a *ngIf="userProfile === 'Administrador'"
         routerLink="/usuarios"
         routerLinkActive="bg-blue-800"
         class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer">
        <iconify-icon icon="ph:users-bold" class="text-xl mr-3"></iconify-icon> Usuários
      </a>

      <a *ngIf="userProfile === 'Administrador'"
         routerLink="/indicadores"
         routerLinkActive="bg-blue-800"
         class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer">
        <iconify-icon icon="ph:chart-line-bold" class="text-xl mr-3"></iconify-icon> Indicadores
      </a>

      <a *ngIf="userProfile === 'Administrador'"
         routerLink="/areas"
         routerLinkActive="bg-blue-800"
         class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer">
        <iconify-icon icon="ph:heartbeat-bold" class="text-xl mr-3"></iconify-icon> Áreas
      </a>
      
      <a *ngIf="userProfile === 'Administrador'"
         routerLink="/cids"
         routerLinkActive="bg-blue-800"
         class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer">
        <iconify-icon icon="ph:book-bookmark-bold" class="text-xl mr-3"></iconify-icon> CIDs
      </a>

    </nav>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="h-16 bg-white shadow flex items-center justify-between px-6 z-10">
      <h1 class="text-xl font-semibold text-gray-800">Área Clínica</h1>
      <div class="flex items-center gap-3">

        <!-- Saudação -->
        <span class="text-sm text-gray-500 font-medium hidden sm:inline">
          Olá, <span class="text-gray-800 font-semibold">{{ primeiroNome }}</span>!
        </span>

        <!-- Avatar — link para Meu Perfil -->
        <a routerLink="/meu-perfil" title="Meu Perfil"
          class="w-9 h-9 rounded-full bg-gradient-to-br flex items-center justify-center
                 text-white text-sm font-bold shadow-sm cursor-pointer select-none
                 ring-2 ring-offset-1 ring-blue-200 hover:ring-blue-400 transition-all hover:shadow-md"
          [ngClass]="avatarGradient">
          {{ getInitials() }}
        </a>

        <!-- Divisor -->
        <div class="w-px h-5 bg-gray-200"></div>

        <!-- Sair -->
        <button (click)="logout()"
          class="text-red-500 hover:text-red-700 flex items-center gap-1 text-sm font-medium transition-colors">
          <iconify-icon icon="ph:sign-out-bold" class="text-lg"></iconify-icon>
          <span class="hidden sm:inline">Sair</span>
        </button>

      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
      <router-outlet></router-outlet>
    </main>

    <footer class="bg-white border-t border-gray-200 p-4 text-center text-sm text-gray-500">
      &copy; 2026 Clínica Escola de Fisioterapia - UCB. Todos os direitos reservados.
    </footer>

  </div>
</div>
