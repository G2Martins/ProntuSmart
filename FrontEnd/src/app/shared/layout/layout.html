<div class="flex h-screen bg-gray-100 font-sans">

  <aside class="w-64 bg-blue-900 text-white flex flex-col shadow-lg">
    <div class="p-6 text-center text-2xl font-bold tracking-wider border-b border-blue-800">
      <iconify-icon icon="ph:heartbeat-bold" class="inline-block align-middle mr-2"></iconify-icon>
      ProntuSMART
    </div>
    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
      <a routerLink="/dashboard" class="flex items-center p-3 rounded hover:bg-blue-800 transition-colors cursor-pointer bg-blue-800">
        <iconify-icon icon="ph:squares-four" class="text-xl mr-3"></iconify-icon> Dashboard
      </a>
      </nav>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">
    
    <header class="h-16 bg-white shadow flex items-center justify-between px-6 z-10">
      <h1 class="text-xl font-semibold text-gray-800">Área Clínica</h1>
      <div class="flex items-center space-x-4">
        <span class="text-sm text-gray-600 font-medium">Olá, {{ userProfile }}</span>
        <button (click)="logout()" class="text-red-500 hover:text-red-700 flex items-center">
          <iconify-icon icon="ph:sign-out" class="text-xl mr-1"></iconify-icon> Sair
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
      <router-outlet></router-outlet> </main>

    <footer class="bg-white border-t border-gray-200 p-4 text-center text-sm text-gray-500">
      &copy; 2026 Clínica Escola de Fisioterapia - UCB. Todos os direitos reservados.
    </footer>

  </div>
</div>
